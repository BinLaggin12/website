services:
  cassandra:
    image: cassandra:latest
    container_name: unicus-cassandra
    hostname: cassandra
    environment:
      - "MAX_HEAP_SIZE=1G"
      - "HEAP_NEWSIZE=256M"
    ports:
      - 127.0.0.1:9042:9042
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'describe keyspaces' 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 60s

  backend:
    container_name: unicus-backend
    build:
      dockerfile: ./Dockerfile.unicus
    ports:
      - 127.0.0.1:3000:3000
    depends_on:
      cassandra:
        condition: service_healthy
