services:
  cassandra:
    image: cassandra:latest
    container_name: unicus-cassandra
    hostname: cassandra
    environment:
      - "MAX_HEAP_SIZE=1G"
      - "HEAP_NEWSIZE=256M"
    ports:
      - 127.0.0.1:9042:9042
    healthcheck:
      test: ["CMD", "cqlsh", "-e", "describe keyspaces"]
      interval: 30s
      timeout: 10s
      retries: 10

  backend:
    container_name: unicus-backend
    build:
      dockerfile: ./Dockerfile.unicus
    ports:
      - 127.0.0.1:8000:8000
    depends_on:
      cassandra:
        condition: service_healthy
