<!DOCTYPE html>
<html>
<head>
<title>Bookings - Unicus Admin</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@300;400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="admin-header">
    <div class="brand">
        <a href="dashboard.html" style="text-decoration:none;">Unicus Diagnostics — Admin</a>
    </div>
    <div class="user-info">
        <span id="userDisplay"></span>
        <button onclick="logout()">Logout</button>
    </div>
</div>
<div class="admin-layout">
<nav class="admin-sidebar">
    <a href="dashboard.html">Dashboard</a>
    <div class="sidebar-section">
        <button class="sidebar-toggle active" onclick="toggleBookingsMenu(event)">Bookings ▾</button>
        <div class="sidebar-submenu" id="bookingsMenu">
            <a href="bookings.html">All Bookings</a>
            <a href="bookings.html?status=pending">Incomplete</a>
            <a href="bookings.html?status=completed">Complete</a>
            <a href="bookings.html?status=confirmed">Pending Approval</a>
            <a href="bookings.html?status=approved">Signed/Approved</a>
            <a href="bookings.html?status=cancelled">Cancelled</a>
        </div>
    </div>
    <a href="reports.html">Reports</a>
    <a href="patients.html">Patients</a>
    <a href="tests.html">Tests</a>
    <a href="doctors.html">Doctors</a>
    <div class="sidebar-spacer"></div>
    <a href="#" class="sidebar-logout" onclick="logout()">Logout</a>
</nav>
<div class="admin-content">
    <div id="message"></div>
    <div class="bookings-tabs" id="bookingsTabs">
        <button class="booking-tab active" data-status="" onclick="selectTab('')">All Bookings <span class="tab-count" id="countAll"></span></button>
        <button class="booking-tab" data-status="pending" onclick="selectTab('pending')">Incomplete <span class="tab-count" id="countPending"></span></button>
        <button class="booking-tab" data-status="completed" onclick="selectTab('completed')">Complete <span class="tab-count" id="countCompleted"></span></button>
        <button class="booking-tab" data-status="confirmed" onclick="selectTab('confirmed')">Pending Approval <span class="tab-count" id="countConfirmed"></span></button>
        <button class="booking-tab" data-status="approved" onclick="selectTab('approved')">Signed/Approved <span class="tab-count" id="countApproved"></span></button>
        <button class="booking-tab" data-status="cancelled" onclick="selectTab('cancelled')">Cancelled <span class="tab-count" id="countCancelled"></span></button>
    </div>
    <div class="data-table-wrap">
        <div class="table-header">
            <h2 id="sectionTitle">All Bookings</h2>
            <input type="text" id="searchInput" placeholder="Search by name or phone..." onkeyup="filterTable()">
        </div>
        <table class="data-table">
            <thead>
                <tr>
                    <th>Patient</th>
                    <th>Phone</th>
                    <th>Test</th>
                    <th>Address</th>
                    <th>Status</th>
                    <th>Date</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="bookingsBody"></tbody>
        </table>
    </div>
</div>
</div>
<div class="modal-overlay" id="statusModal">
    <div class="modal-box">
        <h2>Update Booking Status</h2>
        <input type="hidden" id="editBookingId">
        <label>Status</label>
        <select id="editStatus">
            <option value="pending">Incomplete</option>
            <option value="completed">Complete</option>
            <option value="confirmed">Pending Approval</option>
            <option value="approved">Signed/Approved</option>
            <option value="cancelled">Cancelled</option>
        </select>
        <div class="modal-actions">
            <button class="btn-cancel" onclick="closeModal('statusModal')">Cancel</button>
            <button class="btn-success" onclick="saveStatus()">Save</button>
        </div>
    </div>
</div>
<div class="modal-overlay" id="reportModal">
    <div class="modal-box" style="max-width:700px;">
        <h2 id="reportModalTitle">Generate Report</h2>
        <input type="hidden" id="genBookingId">
        <input type="hidden" id="genTestName">
        <div id="reportFormFields"></div>
        <div class="modal-actions">
            <button class="btn-cancel" onclick="closeModal('reportModal')">Cancel</button>
            <button class="btn-success" onclick="generateReport()">Generate PDF</button>
        </div>
    </div>
</div>
<script src="script.js"></script>
<script>
requireAuth();
document.getElementById('userDisplay').textContent = USERNAME || 'Admin';

var statusLabels = {
    pending: 'Incomplete',
    completed: 'Complete',
    confirmed: 'Pending Approval',
    approved: 'Signed/Approved',
    cancelled: 'Cancelled'
};

var currentFilter = getUrlParam('status') || '';

function selectTab(status) {
    currentFilter = status;
    document.querySelectorAll('.booking-tab').forEach(function(tab) {
        tab.classList.toggle('active', tab.dataset.status === status);
    });
    var label = status ? statusLabels[status] : 'All';
    document.getElementById('sectionTitle').textContent = label + ' Bookings';
    var url = status ? '?status=' + encodeURIComponent(status) : window.location.pathname;
    history.pushState(null, '', url);
    document.getElementById('searchInput').value = '';
    updateSidebarActive(status);
    loadBookings();
}

function updateSidebarActive(status) {
    document.querySelectorAll('#bookingsMenu a').forEach(function(link) {
        var href = link.getAttribute('href');
        var linkStatus = href.indexOf('status=') > -1 ? href.split('status=')[1] : '';
        link.classList.toggle('active', linkStatus === status);
    });
}

function loadBookings() {
    api('/bookings?_=' + Date.now()).then(function(allBookings) {
        var bookings = currentFilter
            ? allBookings.filter(function(b) { return b.status === currentFilter; })
            : allBookings;
        updateCounts(allBookings);
        var reportPromises = bookings.map(function(b) {
            return fetch('/api/report/' + b.booking_id).then(function(r) {
                if (r.ok) return r.json();
                return null;
            }).catch(function() { return null; });
        });
        Promise.all(reportPromises).then(function(reports) {
            var tbody = document.getElementById('bookingsBody');
            tbody.innerHTML = '';
            bookings.forEach(function(b, i) {
                var report = reports[i];
                var hasPdf = report && report.pdf_path;
                var statusLabel = statusLabels[b.status] || b.status;
                var statusClass = 'status-' + b.status;
                var downloadBtn = hasPdf
                    ? '<a href="/api/admin/reports/' + b.booking_id + '/download" target="_blank" class="btn-download" style="margin-left:4px;padding:4px 10px;border-radius:4px;color:#fff;text-decoration:none;font-size:12px;background:#2e7d32;">PDF</a>'
                    : '';
                tbody.innerHTML +=
                    '<tr data-booking-id="' + b.booking_id + '">' +
                    '<td>' + escapeHtml(b.patient_name) + '</td>' +
                    '<td>' + escapeHtml(b.patient_phone) + '</td>' +
                    '<td>' + escapeHtml(b.test_name) + '</td>' +
                    '<td>' + escapeHtml(b.collection_address) + '</td>' +
                    '<td><span class="status ' + statusClass + '">' + escapeHtml(statusLabel) + '</span></td>' +
                    '<td>' + escapeHtml(b.created_at || '').substring(0, 10) + '</td>' +
                    '<td class="actions">' +
                    '<button class="btn-edit" onclick="openStatusModal(\'' + b.booking_id + '\', \'' + b.status + '\')">Status</button>' +
                    '<button class="btn-success" onclick="openReportModal(\'' + b.booking_id + '\', \'' + escapeHtml(b.test_name) + '\')" style="margin-left:4px;">Report</button>' +
                    downloadBtn +
                    '</td>' +
                    '</tr>';
            });
        });
    });
}

function updateCounts(allBookings) {
    var counts = { pending: 0, completed: 0, confirmed: 0, approved: 0, cancelled: 0 };
    allBookings.forEach(function(b) {
        if (counts[b.status] !== undefined) counts[b.status]++;
    });
    document.getElementById('countAll').textContent = '(' + allBookings.length + ')';
    document.getElementById('countPending').textContent = '(' + counts.pending + ')';
    document.getElementById('countCompleted').textContent = '(' + counts.completed + ')';
    document.getElementById('countConfirmed').textContent = '(' + counts.confirmed + ')';
    document.getElementById('countApproved').textContent = '(' + counts.approved + ')';
    document.getElementById('countCancelled').textContent = '(' + counts.cancelled + ')';
}

function refreshCounts() {
    api('/bookings?_=' + Date.now()).then(updateCounts);
}

function filterTable() {
    var input = document.getElementById('searchInput').value.toLowerCase();
    var rows = document.querySelectorAll('#bookingsBody tr');
    rows.forEach(function(row) {
        var text = row.textContent.toLowerCase();
        row.style.display = text.indexOf(input) > -1 ? '' : 'none';
    });
}

function openStatusModal(bookingId, currentStatus) {
    document.getElementById('editBookingId').value = bookingId;
    document.getElementById('editStatus').value = currentStatus;
    document.getElementById('statusModal').classList.add('show');
}

function closeModal(id) {
    document.getElementById(id).classList.remove('show');
}

function saveStatus() {
    var bookingId = document.getElementById('editBookingId').value;
    var newStatus = document.getElementById('editStatus').value;
    var newLabel = statusLabels[newStatus] || newStatus;
    api('/booking/' + bookingId + '/status', 'PUT', {status: newStatus}).then(function(result) {
        closeModal('statusModal');
        var row = document.querySelector('#bookingsBody tr[data-booking-id="' + bookingId + '"]');
        if (row) {
            if (currentFilter && currentFilter !== newStatus) {
                row.style.opacity = '0';
                row.style.transition = 'opacity 0.3s';
                setTimeout(function() { row.remove(); }, 300);
            } else {
                row.querySelector('.status').textContent = newLabel;
                row.querySelector('.status').className = 'status status-' + newStatus;
                row.querySelector('button.btn-edit').setAttribute('onclick', "openStatusModal('" + bookingId + "', '" + newStatus + "')");
            }
        }
        refreshCounts();
        showMessage('Status updated to ' + newLabel, 'success');
    }).catch(function(err) {
        showMessage('Status update failed: ' + err.message, 'error');
    });
}

function openReportModal(bookingId, testName) {
    document.getElementById('genBookingId').value = bookingId;
    document.getElementById('genTestName').value = testName;
    document.getElementById('reportModalTitle').textContent = 'Generate Report - ' + testName;
    var fieldsDiv = document.getElementById('reportFormFields');
    fieldsDiv.innerHTML = '<p class="loading">Loading parameters...</p>';
    document.getElementById('reportModal').classList.add('show');
    api('/tests/' + encodeURIComponent(testName) + '/parameters').then(function(params) {
        fieldsDiv.innerHTML = '';
        params.forEach(function(p) {
            var label = document.createElement('label');
            label.textContent = p.name + ' (' + p.unit + ')  [Normal: ' + p.normal_range + ']';
            fieldsDiv.appendChild(label);
            var input = document.createElement('input');
            input.type = 'text';
            input.className = 'param-input';
            input.dataset.paramName = p.name;
            input.placeholder = 'Enter ' + p.name;
            fieldsDiv.appendChild(input);
        });
    }).catch(function(err) {
        fieldsDiv.innerHTML = '<p class="error">Failed to load parameters: ' + err.message + '</p>';
    });
}

function generateReport() {
    var bookingId = document.getElementById('genBookingId').value;
    var inputs = document.querySelectorAll('#reportFormFields .param-input');
    var parameterValues = {};
    var allFilled = true;
    inputs.forEach(function(inp) {
        var val = inp.value.trim();
        if (val === '') allFilled = false;
        parameterValues[inp.dataset.paramName] = val;
    });
    if (!allFilled) {
        showMessage('Please fill in all parameter values', 'error');
        return;
    }
    api('/bookings/' + bookingId + '/generate-pdf', 'POST', {parameter_values: parameterValues}).then(function(result) {
        showMessage('PDF report generated successfully. <a href="/api/admin/reports/' + bookingId + '/download" target="_blank" style="color:#fff;font-weight:bold;">Download PDF</a>');
        closeModal('reportModal');
        loadBookings();
    }).catch(function(err) {
        showMessage('Failed to generate PDF: ' + err.message, 'error');
    });
}

function logout() {
    api('/logout', 'POST').then(function() {
        localStorage.removeItem('admin_token');
        localStorage.removeItem('admin_username');
        window.location.href = 'login.html';
    });
}

selectTab(currentFilter);
</script>
</body>
</html>
